<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Mario Style Mobile Runner - Phaser 4</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      body {
        background-color: #000;
        font-family: Arial, sans-serif;
        /* Prevents blue tap-highlight boxes on mobile browsers */
        -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
      }
      #game-container {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
      }
      canvas {
        display: block;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@4.1.0/dist/phaser.min.js"></script>
  </head>
  <body>
    <div id="game-container"></div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
